<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PruneGTFS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PruneGTFS</h1>

    <div class="container">
        <div class="controls">
            <div class="file-upload-area">
                <label for="gtfs-upload" class="file-upload-label">Choose GTFS ZIP file:</label>
                <input type="file" id="gtfs-upload" accept=".zip">
            </div>
            <div class="selected-routes-area">
                <h2>Selected Routes:</h2>
                <div id="selected-routes-list">
                    <p>No routes selected yet.</p>
                </div>
            </div>
            <button id="export-button" disabled>Export Pruned GTFS</button>
        </div>
        <div id="map">
            <div id="loading-indicator" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.8); padding: 20px; border-radius: 5px; z-index: 10000;">
                <p id="loading-message">Loading and processing GTFS data, please wait...</p>
                <div id="loading-progress"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
